name: Build and Deploy
on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
    paths:
      - .github/.docker/**
      - .github/workflows/build.yml
      - .github/workflows/prebuild.yml
      - .github/workflows/test.yml
      - packages/app/**
      - packages/shared/**
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  prebuild:
    name: Prebuild ENState 🧪
    uses: ./.github/workflows/prebuild.yml
    secrets: inherit
  build:
    name: Build ENState 🚀
    # runs-on: arc-runner-set
    runs-on: ubuntu-latest
    needs: [prebuild]
    steps:
      - uses: actions/checkout@v3

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: enstate
          path: ./target/release

      - name: Build
        run: chmod +x ./target/release/enstate

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/web3bio/enstate
          tags: |
            type=raw,value=newresolver
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        # with:
          # driver: kubernetes
          # driver-opts: namespace=buildkit

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v3
        with:
          push: true
          file: .github/.docker/Dockerfile
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/web3bio/enstate:edge
          cache-to: type=inline
