name: PR Test
on:
  pull_request:
    branches:
      - master
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  prebuild:
    name: Prebuild ENState 🧪
    uses: ./.github/workflows/prebuild.yml
    secrets: inherit
  test:
    name: Test ENState 🚀
    # runs-on: arc-runner-set
    runs-on: ubuntu-latest
    needs: [prebuild]
    strategy:
      fail-fast: false
      matrix:
        suite: [app] #, worker]
        include:
          - suite: app
            env_file: .env
          # - suite: worker
          #   build: bun install --global pnpm && pnpm install && pnpm build
          #   env_file: .dev.vars
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1

      - run: bun install
        working-directory: test

      - name: Set-up environment (${{ matrix.env_file }})
        shell: bash
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          OPENSEA_API_KEY: ${{ secrets.OPENSEA_API_KEY }}
        run: |
          cat <<EOF > ${{ matrix.env_file }}
          RPC_URL=$RPC_URL
          OPENSEA_API_KEY=$OPENSEA_API_KEY
          UNIVERSAL_RESOLVER=0xeEeEEEeE14D718C2B47D9923Deab1335E144EeEe
          EOF
        working-directory: packages/${{ matrix.suite }}

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: enstate
          path: ./target/release/

      - name: Build
        run: chmod +x ./target/release/enstate

      # - name: Build
      #   run: ${{ matrix.build }}
      #   working-directory: ${{ matrix.suite }}

      - name: Test
        shell: bash
        run: |
          set -a
          source packages/${{ matrix.suite }}/${{ matrix.env_file }}
          set +a

          ./target/release/enstate &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          cd test
          bun test --env-file=../packages/${{ matrix.suite }}/${{ matrix.env_file }} tests/server.spec.ts --timeout 10000 --rerun-each 2
